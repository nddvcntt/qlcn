version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: qlcn-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: qlcn_user
      POSTGRES_PASSWORD: qlcn_dev_password
      POSTGRES_DB: qlcn_dev
    ports:
      - "5455:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qlcn_user -d qlcn_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: qlcn_postgres_dev
